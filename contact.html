<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loving Homes | Contact Us</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="logo">loving homes</div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="facilities.html">Facilities</a></li>
            <li><a href="dog-care.html">Dog Care</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <main>
        <section class="bg-light">
            <h2>Contact Us</h2>
            <p>Get in touch to book a package, arrange a custom stay, or ask any questions.</p>
            
            <div class="contact-container">
                <div class="contact-form">
                    <form action="#" method="POST">
                        <label for="name" style="display:none;">Name</label>
                        <input type="text" id="name" placeholder="Your Name" required>
                        
                        <label for="email" style="display:none;">Email</label>
                        <input type="email" id="email" placeholder="Your Email" required>
                        
                        <label for="message" style="display:none;">Message</label>
                        <textarea id="message" rows="5" placeholder="How can we help you?" required></textarea>
                        
                        <button type="submit">Send Message</button>
                    </form>
                </div>
                <div class="map-box">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d471220.563060398!2d113.88312061099684!3d22.381310123519808!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3403e2eda332980f%3A0xf08ab3badbeac97c!2sHong%20Kong!5e0!3m2!1sen!2sus!4v1700000000000!5m2!1sen!2sus" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 Loving Homes | Luxury Dog Experience | Hong Kong</p>
    </footer>

</body>
</html>
